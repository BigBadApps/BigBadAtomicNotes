<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Glow -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e1b4b" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#090a0f" stop-opacity="1"/>
    </radialGradient>

    <!-- Ring Gradient 1 -->
    <linearGradient id="ringGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#818cf8" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>

    <!-- Ring Gradient 2 -->
    <linearGradient id="ringGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#38bdf8" />
    </linearGradient>

    <!-- Star Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Dark Circular Base -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGlow)" stroke="#312e81" stroke-width="6" />

  <!-- Outer Orbital Ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#ringGrad1)" stroke-width="14" stroke-dasharray="850 250" stroke-linecap="round" transform="rotate(-45 256 256)"/>

  <!-- Middle Orbital Arc -->
  <circle cx="256" cy="256" r="135" fill="none" stroke="url(#ringGrad2)" stroke-width="16" stroke-dasharray="450 400" stroke-linecap="round" transform="rotate(75 256 256)"/>

  <!-- Inner Subtle Ring -->
  <circle cx="256" cy="256" r="95" fill="none" stroke="#4c1d95" stroke-opacity="0.4" stroke-width="6" stroke-dasharray="10 15"/>

  <!-- Center Sparkling Atomic Star -->
  <g filter="url(#glow)">
    <path d="M 256 160 C 256 215, 215 256, 160 256 C 215 256, 256 297, 256 352 C 256 297, 297 256, 352 256 C 297 256, 256 215, 256 160 Z" fill="none" stroke="#c084fc" stroke-width="16" stroke-linejoin="round" stroke-linecap="round" />
    <path d="M 256 185 C 256 230, 230 256, 185 256 C 230 256, 256 282, 256 327 C 256 282, 282 256, 327 256 C 282 256, 256 230, 256 185 Z" fill="#818cf8" />
  </g>

  <!-- Accent Orbital Particle Dots -->
  <circle cx="330" cy="180" r="14" fill="#60a5fa" />
  <circle cx="180" cy="335" r="10" fill="#e879f9" />
  <circle cx="340" cy="300" r="8" fill="#a78bfa" />
</svg>
